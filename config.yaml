project:
  name: "Embodied-Motion-Flow"
  version: "1.0.0"
  output_dir: "outputs"
  log_level: "INFO"

reproducibility:
  seed: 42
  deterministic_torch: true
  benchmark_cudnn: false

device:
  preference: "auto"   # auto | cuda | mps | cpu

data:
  num_joints: 12
  sequence_length: 360
  train_samples: 1536
  val_samples: 384
  test_samples: 384
  batch_size: 64
  num_workers: 0
  sample_rate_hz: 30.0

  motion_modes:
    walking:
      enabled: true
      frequency_hz: 1.2
      amplitude_scale: 0.65
    reaching:
      enabled: true
      frequency_hz: 0.6
      amplitude_scale: 0.45
    idle_stabilization:
      enabled: true
      frequency_hz: 0.35
      amplitude_scale: 0.30
    inspection_poses:
      enabled: true
      frequency_hz: 0.45
      amplitude_scale: 0.50
    recovery_motions:
      enabled: true
      frequency_hz: 1.0
      amplitude_scale: 0.55

  anomalies:
    enabled: true
    anomaly_fraction: 0.28
    unstable_pose_probability: 0.35
    sensor_spike_probability: 0.35
    jitter_probability: 0.30
    long_tail_probability: 0.35
    abrupt_acceleration_probability: 0.30
    sensor_noise_std: 0.08
    spike_scale: 1.75
    jitter_scale: 0.12
    drift_scale: 0.55

  joint_limits:
    # Radians for abstract 12-DOF humanoid representation.
    lower:
      [-0.80, -0.50, -1.20, -0.80, -0.50, -1.20, -0.90, -0.60, -1.40, -0.90, -0.60, -1.40]
    upper:
      [ 0.80,  0.90,  1.20,  0.80,  0.90,  1.20,  0.90,  0.60,  1.40,  0.90,  0.60,  1.40]

model:
  name: "1d_transformer_diffusion"
  input_dim: 12
  hidden_dim: 128
  num_layers: 4
  num_heads: 4
  dropout: 0.1
  time_embedding_dim: 128

diffusion:
  timesteps: 200
  beta_schedule: "linear"
  beta_start: 0.0001
  beta_end: 0.02
  prediction_target: "noise"   # noise | sample

training:
  epochs: 10
  learning_rate: 0.0002
  weight_decay: 0.000001
  grad_clip_norm: 1.0
  mixed_precision: true
  save_every_epochs: 5

loss:
  reconstruction_weight: 1.0
  lambda_phys: 0.25
  acceleration_weight: 0.15
  joint_limit_weight: 0.25
  temporal_jitter_weight: 0.10

evaluation:
  metrics:
    - "mse_reconstruction"
    - "temporal_smoothness"
    - "auroc_anomaly"
  anomaly_score: "reconstruction_plus_biomechanical"
  reconstruction_steps: 80

visualization:
  fps: 24
  max_frames: 360
  dpi: 140
