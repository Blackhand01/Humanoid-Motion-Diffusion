project:
  name: "Embodied-Motion-Flow"
  version: "1.0.0"
  output_dir: "outputs"
  log_level: "INFO"

reproducibility:
  seed: 42
  deterministic_torch: true
  benchmark_cudnn: false

device:
  preference: "auto"   # auto | cuda | mps | cpu

data:
  source: "aistpp"                 # aistpp | synthetic
  representation: "smpl_axis_angle_24x3"
  num_joints: 24
  input_dim: 72
  sequence_length: 360
  train_samples: 1536
  val_samples: 384
  test_samples: 384
  batch_size: 64
  num_workers: 0
  sample_rate_hz: 30.0

  aist:
    root_dir: "${AISTPP_ROOT:-/kaggle/input/aistplusplus}"
    file_glob: "**/*"
    pose_keys:
      - "smpl_poses"
      - "poses"
      - "pose"
      - "theta"
      - "thetas"
      - "pred_thetas"
    source_fps: 60.0
    target_fps: 30.0
    clip_stride: 180
    train_split: 0.80
    val_split: 0.10
    max_files_per_split: null

  motion_modes:
    walking:
      enabled: true
      frequency_hz: 1.2
      amplitude_scale: 0.65
    reaching:
      enabled: true
      frequency_hz: 0.6
      amplitude_scale: 0.45
    idle_stabilization:
      enabled: true
      frequency_hz: 0.35
      amplitude_scale: 0.30
    inspection_poses:
      enabled: true
      frequency_hz: 0.45
      amplitude_scale: 0.50
    recovery_motions:
      enabled: true
      frequency_hz: 1.0
      amplitude_scale: 0.55

  anomalies:
    enabled: true
    anomaly_fraction: 0.28
    unstable_pose_probability: 0.35
    sensor_spike_probability: 0.35
    jitter_probability: 0.30
    long_tail_probability: 0.35
    abrupt_acceleration_probability: 0.30
    sensor_noise_std: 0.08
    spike_scale: 1.75
    jitter_scale: 0.12
    drift_scale: 0.55

  joint_limits:
    # Radians for SMPL 24-joint axis-angle representation; refined anatomical limits arrive in Phase 4.
    lower:
      [-3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14,
       -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14,
       -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14,
       -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14,
       -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14,
       -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14, -3.14]
    upper:
      [3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14,
       3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14,
       3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14,
       3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14,
       3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14,
       3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14, 3.14]

model:
  name: "1d_transformer_diffusion"
  input_dim: 72
  hidden_dim: 128
  num_layers: 4
  num_heads: 4
  dropout: 0.1
  time_embedding_dim: 128

diffusion:
  timesteps: 200
  beta_schedule: "linear"
  beta_start: 0.0001
  beta_end: 0.02
  prediction_target: "noise"   # noise | sample

training:
  epochs: 10
  learning_rate: 0.0002
  weight_decay: 0.000001
  grad_clip_norm: 1.0
  mixed_precision: true
  save_every_epochs: 5

loss:
  reconstruction_weight: 1.0
  lambda_phys: 0.25
  acceleration_weight: 0.15
  joint_limit_weight: 0.25
  temporal_jitter_weight: 0.10

evaluation:
  metrics:
    - "mse_reconstruction"
    - "temporal_smoothness"
    - "auroc_anomaly"
  anomaly_score: "reconstruction_plus_biomechanical"
  reconstruction_steps: 80

visualization:
  fps: 24
  max_frames: 360
  dpi: 140
