inherits: base.yaml

project:
  output_dir: "outputs/testing"
  log_level: "INFO"

device:
  preference: "cpu"

data:
  source: "aistpp"
  sequence_length: 48
  train_samples: 32
  val_samples: 16
  test_samples: 16
  batch_size: 4
  num_workers: 0
  aist:
    clip_stride: 24
    max_files_per_split: 4
    toy_mode: true
    toy_max_files_per_split: 4

audio:
  cache_dir: "outputs/testing/audio_features"
  require_audio: false
  min_coverage: 0.0
  log_missing_audio: true

model:
  hidden_dim: 64
  num_layers: 2
  num_heads: 4
  time_embedding_dim: 64

diffusion:
  timesteps: 50

training:
  epochs: 1
  mixed_precision: false
  save_every_epochs: 1
  max_duration_seconds: 120
  cond_dropout: 0.15
  ema_decay: 0.99
  accumulation_steps: 1
  warmup_epochs: 0
  log_every_steps: 5

evaluation:
  reconstruction_steps: 10

inference:
  guidance_scale: 1.0
  sliding_window_frames: 48
  prefix_frames: 12
  generation_frames: 96
  diffusion_steps: 10

visualization:
  fps: 12
  max_frames: 48
  dpi: 100

showcase:
  output_dir: "outputs/testing/showcase"
  viral_fps: 12
  research_fps: 12
  render_dpi: 100
